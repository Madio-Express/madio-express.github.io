  <!-- Instant splash shown before the Flutter engine boots, so the user never
       stares at a blank white page while main.dart.js + CanvasKit download.
       Removed on the `flutter-first-frame` event (see script at end of body). -->
  <style>
    #app-splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #FBFBFB;
      transition: opacity 0.35s ease;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app-splash.app-splash--hidden {
      opacity: 0;
      pointer-events: none;
    }

    #app-splash .app-splash__spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(90, 50, 105, 0.15);
      border-top-color: #5A3269;
      border-radius: 50%;
      animation: app-splash-spin 0.9s linear infinite;
    }

    #app-splash .app-splash__label {
      margin-top: 16px;
      color: #5A3269;
      font-size: 14px;
      letter-spacing: 0.3px;
    }

    @keyframes app-splash-spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>

  <script>
    // Backwards compatibility with old links: on custom domains (edge-proxy)
    // the app uses path URLs, so a shared link like /#/store_57/product_196
    // is converted to /store_57/product_196 before Flutter reads the route.
    // On GitHub Pages (static hosting, no rewrites) the hash is kept.
    (function () {
      if (window.location.host === 'madio-express.github.io') return;
      var hash = window.location.hash;
      if (hash && hash.indexOf('#/') === 0) {
        window.history.replaceState(null, '', hash.slice(1) + window.location.search);
      }
    })();
  </script>

  <script>
    // The value below is injected by flutter build, do not touch.
    const serviceWorkerVersion = "801493487";
  </script>

  <script>
    // Deploy stamp: tool/deploy_web.ps1 replaces the placeholder with a unique
    // build id (git sha + timestamp) and writes the same id to
    // build_version.txt. Together they give cache-proof updates: the entrypoint
    // is fetched as main.dart.js?v=<id> (URL changes every deploy, so the HTTP
    // cache can never serve a stale bundle) and the update checker at the
    // bottom compares this baked id against the deployed one. In local dev the
    // placeholder stays as-is and both mechanisms turn themselves off.
    var appBuildId = '86954aa-20260703115252';
    var appBuildIdIsReal = appBuildId.indexOf('__') !== 0;
  </script>

  <script>
    // Defensive: drop any previously-installed Flutter service worker. A stale
    // SW cache served customers a pre-security-migration main.dart.js that called
    // now-dead authenticated endpoints (/store/store/{id}, vercel supply-chain)
    // → 401/CORS → store failed to load on first try. This storefront is
    // online-only, so we no longer register a SW (see the loader below); already
    // poisoned clients are healed by the killswitch flutter_service_worker.js
    // (tool/disable_service_worker.js). No reload here to avoid loops.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      }).catch(function () {});
    }
  </script>
  <!-- This script adds the flutter initialization JS code -->
  <script src="flutter.js" defer></script>

  <!-- MercadoPago SDK is loaded ON DEMAND (only when the user reaches the MP
       payment step), not on every visit. This keeps ~3 script downloads and a
       device-fingerprint XHR off the initial cold start, which most visitors
       (contra-entrega / transferencia) never need. window.loadMercadoPagoSdk()
       is idempotent and resolves once window.MercadoPagoBridge is ready; the
       payment brick widget triggers it and waits before rendering. -->
  <script>
    (function () {
      var mpPromise = null;
      function loadScript(src, attrs) {
        return new Promise(function (resolve, reject) {
          var s = document.createElement('script');
          s.src = src;
          if (attrs) {
            Object.keys(attrs).forEach(function (k) { s.setAttribute(k, attrs[k]); });
          }
          s.onload = function () { resolve(); };
          s.onerror = function () { reject(new Error('Failed to load ' + src)); };
          document.head.appendChild(s);
        });
      }
      // Order matters: SDK first, then security.js (device fingerprint), then
      // the bridge (reads the SDK global and defines window.MercadoPagoBridge).
      window.loadMercadoPagoSdk = function () {
        if (mpPromise) return mpPromise;
        mpPromise = loadScript('https://sdk.mercadopago.com/js/v2')
          .then(function () {
            return loadScript('https://www.mercadopago.com/v2/security.js', { view: 'checkout' });
          })
          .then(function () { return loadScript('mercadopago_bridge.js'); })
          .catch(function (e) { mpPromise = null; throw e; });
        return mpPromise;
      };
    })();
  </script>
</head>

<body>
  <!-- Instant splash (styled in <head>). Painted by the browser immediately,
       removed once Flutter rasterizes its first frame. -->
  <div id="app-splash">
    <div class="app-splash__spinner"></div>
    <div class="app-splash__label">Cargando…</div>
  </div>

  <!-- Firebase JS is auto-injected by the firebase_core / firebase_auth Flutter
       plugins (v3/v5). The old manual 8.6.1 compat <script> tags + config block
       were unused (initializeApp was already commented out) and only added two
       blocking downloads on every load, so they were removed. -->

  <script>
    // Remove the instant splash as soon as Flutter paints its first frame.
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('app-splash');
      if (!splash) return;
      splash.classList.add('app-splash--hidden');
      setTimeout(function () {
        if (splash.parentNode) splash.parentNode.removeChild(splash);
      }, 400);
    });
  </script>

  <script>
    window.addEventListener('load', function (ev) {
      // Download main.dart.js WITHOUT registering a service worker. Stale SW
      // caching is what served customers an outdated build after the security
      // migration; for an online-only storefront the offline cache isn't worth
      // breaking deploys. New visitors install no SW; deploys take effect on the
      // next load.
      _flutter.loader.loadEntrypoint({
        // Versioned URL = hard cache-bust on every deploy (see appBuildId).
        entrypointUrl: appBuildIdIsReal ? 'main.dart.js?v=' + appBuildId : 'main.dart.js',
        onEntrypointLoaded: function (engineInitializer) {
          engineInitializer.initializeEngine().then(function (appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>

  <script>
    // Auto-update WITHOUT a service worker. This storefront deliberately
    // registers none (a stale SW cache once served a broken build after the
    // security migration), so we can't rely on the SW update cycle. Instead
    // the page knows its own build id (appBuildId, baked at deploy) and
    // compares it against build_version.txt at the origin. The old approach
    // (ETag baseline read at load) could never detect that the PAGE ITSELF
    // was stale — this one can. Behavior:
    //   - stale detected at page load or when returning to the tab -> reload
    //     silently once (nothing in progress to lose; the cart persists).
    //   - stale detected mid-session (5-min poll) -> non-intrusive banner.
    //   - anti-loop guard: if we already auto-reloaded for a given remote id
    //     (Pages edge can serve the old index.html for up to ~10 min), fall
    //     back to the banner instead of reloading again.
    (function () {
      if (!appBuildIdIsReal) return; // local dev: no deploy stamp, no checker

      var RELOADED_KEY = 'app_update_reloaded_to';

      // A build id looks like "<git sha>-<yyyyMMddHHmmss>". Anything else is
      // NOT a version: custom domains sit behind the edge-proxy, whose SPA
      // fallback answered /build_version.txt with a full index.html before it
      // learned to pass .txt through — comparing that HTML against appBuildId
      // made the update banner permanent (2026-07-02). Never trust content
      // that doesn't match the shape.
      var BUILD_ID_SHAPE = /^[0-9a-f]{6,40}-\d{8,17}$/i;

      function fetchDeployedId() {
        // Cache-busting query + no-store defeats both the browser and the CDN
        // edge cache, so we always read the version currently at the origin.
        return fetch('build_version.txt?_v=' + Date.now(), { cache: 'no-store' })
          .then(function (res) {
            if (!res.ok) return null;
            return res.text().then(function (t) {
              var id = (t || '').trim();
              return BUILD_ID_SHAPE.test(id) ? id : null;
            });
          })
          .catch(function () { return null; });
      }

      function showUpdateBanner() {
        if (document.getElementById('app-update-banner')) return;
        var style = document.createElement('style');
        style.textContent =
          '#app-update-banner{position:fixed;left:50%;bottom:24px;' +
          'transform:translateX(-50%) translateY(160%);display:flex;align-items:center;' +
          'gap:14px;padding:12px 14px 12px 20px;border-radius:14px;background:#FFFFFF;' +
          'color:#2A2A2A;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;' +
          'font-size:14px;box-shadow:0 10px 40px rgba(90,50,105,.25);' +
          'border:1px solid rgba(90,50,105,.18);z-index:2147483647;' +
          'transition:transform .35s cubic-bezier(.2,.8,.2,1);max-width:calc(100vw - 32px)}' +
          '#app-update-banner.app-update-banner--in{transform:translateX(-50%) translateY(0)}' +
          '#app-update-banner .aub-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}' +
          '#app-update-banner .aub-reload{cursor:pointer;border:0;border-radius:9px;' +
          'padding:8px 16px;font-weight:600;font-size:14px;background:#5A3269;color:#fff}' +
          '#app-update-banner .aub-reload:hover{background:#6d3d80}' +
          '#app-update-banner .aub-close{cursor:pointer;border:0;background:transparent;' +
          'color:#9A8AA0;font-size:20px;line-height:1;padding:0 4px}' +
          '#app-update-banner .aub-close:hover{color:#2A2A2A}';
        document.head.appendChild(style);

        var bar = document.createElement('div');
        bar.id = 'app-update-banner';
        bar.setAttribute('role', 'status');
        bar.innerHTML =
          '<span class="aub-text">Hay una nueva versión disponible</span>' +
          '<button type="button" class="aub-reload">Actualizar</button>' +
          '<button type="button" class="aub-close" aria-label="Cerrar">×</button>';
        document.body.appendChild(bar);
        requestAnimationFrame(function () { bar.classList.add('app-update-banner--in'); });

        bar.querySelector('.aub-reload').addEventListener('click', function () {
          window.location.reload();
        });
        bar.querySelector('.aub-close').addEventListener('click', function () {
          bar.classList.remove('app-update-banner--in');
          setTimeout(function () { if (bar.parentNode) bar.remove(); }, 350);
        });
      }

      function tryAutoReload(remoteId) {
        var alreadyTried = null;
        try { alreadyTried = sessionStorage.getItem(RELOADED_KEY); } catch (e) {}
        if (alreadyTried === remoteId) {
          // We already reloaded for this deploy and still got the old page
          // (stale index.html at the edge). Don't loop — just offer the banner.
          showUpdateBanner();
          return;
        }
        try { sessionStorage.setItem(RELOADED_KEY, remoteId); } catch (e) {}
        window.location.reload();
      }

      // silent=true (page load / tab became visible): reload without asking.
      // silent=false (mid-session poll): show the banner, never yank the page.
      function check(silent) {
        fetchDeployedId().then(function (remoteId) {
          if (!remoteId || remoteId === appBuildId) return;
          if (silent) { tryAutoReload(remoteId); } else { showUpdateBanner(); }
        });
      }

      check(true);
      setInterval(function () { check(false); }, 5 * 60 * 1000);
      document.addEventListener('visibilitychange', function () {
        if (document.visibilityState === 'visible') check(true);
      });
    })();
  </script>
</body>

</html>
